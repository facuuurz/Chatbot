version: "3.1"

nlu:
- intent: ask_api_data
  examples: |
    - ¿Cuál es el clima en [Madrid](location)?
    - dime los precios de hoy
    - necesito información sobre el clima en [Kiev](location)
    - ¿a cuánto está el precio?
    - quiero consultar el clima
    - muéstrame los precios actuales
    - ¿qué clima hace hoy en [parana](location)?

- intent: ask_future_weather
  examples: |
    - ¿cuando va a hacer calor en [Parana](location)?
    - dime que dia hara calor
    - ¿cuando va a hacer frio en [Madrid](location)?
    - ¿que dia va a llover?
    - ¿cuando llueve en [Oro Verde](location)?
    - quiero saber cuando hara frio en [Kiev](location)
    - cuando hará calor

- intent: chitchat
  examples: |
    - hola
    - buenas
    - ¿quién eres?
    - ¿cómo estás?
    - cuéntame un chiste
    - jaja muy gracioso
    - ¿qué tal todo?
    - eres un robot
    - ¿qué haces?

- intent: exit_conversation
  examples: |
    - salir
    - adiós
    - me quiero ir
    - terminar
    - chao
    - finalizar
    - sin entrada
