version: "3.1"

nlu:
- intent: ask_api_data
  examples: |
    - ¿Cuál es el clima en [Madrid](location)?
    - necesito información sobre el clima en [Kiev](location)
    - quiero consultar el clima
    - ¿qué clima hace hoy en [parana](location)?
    - clima actual
    - que temperatura hay en [kyiv](location)
    - que temperatura hay
    - cual es la temperatura
    - que probabilidad de lluvia hay
    - probabilidad de lluvia
    - cómo está el clima
    - decime la temperatura

- intent: ask_future_weather
  examples: |
    - ¿cuando va a hacer calor en [Parana](location)?
    - dime que dia hara calor
    - ¿cuando va a hacer frio en [Madrid](location)?
    - ¿que dia va a llover?
    - ¿cuando llueve en [Oro Verde](location)?
    - quiero saber cuando hara frio en [Kiev](location)
    - cuando hará calor
    - pronóstico
    - lloverá mañana?
    - va a llover?

- intent: greet
  examples: |
    - hola
    - buenas
    - hello
    - qué tal
    - buenos días
    - buenas tardes

- intent: goodbye
  examples: |
    - salir
    - adiós
    - me quiero ir
    - terminar
    - chao
    - finalizar
    - bye

- intent: thanks
  examples: |
    - gracias
    - muchas gracias
    - te lo agradezco
    - perfecto gracias

- intent: chitchat
  examples: |
    - ¿quién eres?
    - ¿cómo estás?
    - cuéntame un chiste
    - jaja muy gracioso
    - ¿qué tal todo?
    - eres un robot
    - ¿qué haces?
