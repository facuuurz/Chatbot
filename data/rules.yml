version: "3.1"

rules:
- rule: Intercept and handle Chitchat
  steps:
  - intent: chitchat
  - action: utter_chitchat
  # Inmediatamente redirige al flujo de la API para mantener el contexto
  - action: utter_redirect_to_api

- rule: API Flow
  steps:
  - intent: ask_api_data
  - action: action_call_api

- rule: Goodbye or No-Input handle (Exit)
  steps:
  - intent: exit_conversation
  - action: action_session_start

- rule: Interactive Predictive Weather
  steps:
  - intent: ask_future_weather
  - action: action_future_weather
