version: "3.1"

rules:
- rule: Respond to greet
  steps:
  - intent: greet
  - action: utter_greet

- rule: Respond to thanks
  steps:
  - intent: thanks
  - action: utter_welcome

- rule: Respond to goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye
  - action: action_session_start

- rule: Intercept and handle Chitchat
  steps:
  - intent: chitchat
  - action: utter_chitchat

- rule: API Flow (Clima Actual)
  steps:
  - intent: ask_api_data
  - action: action_call_api

- rule: Interactive Predictive Weather (Pronostico)
  steps:
  - intent: ask_future_weather
  - action: action_future_weather
