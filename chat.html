<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASA Explorer Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ──────────────────────────────────────── */
    :root {
      --bg:          #070b14;
      --surface:     #0d1526;
      --surface2:    #111d35;
      --border:      rgba(79, 195, 247, 0.15);
      --accent:      #4fc3f7;
      --accent-glow: rgba(79, 195, 247, 0.25);
      --nasa-orange: #fc6329;
      --nasa-glow:   rgba(252, 99, 41, 0.3);
      --user-bubble: linear-gradient(135deg, #fc6329, #e84f18);
      --bot-bubble:  rgba(13, 25, 50, 0.9);
      --text:        #e8f4fd;
      --text-muted:  #6b8db5;
      --radius:      16px;
      --font-main:   'Inter', sans-serif;
      --font-mono:   'Space Mono', monospace;
    }

    /* ── Reset & Base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Starfield ──────────────────────────────────────────── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      width: min(780px, 100vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: rgba(13, 21, 38, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3a6b, #0d2040);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 16px var(--accent-glow);
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 5px;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .nasa-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(79, 195, 247, 0.1);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      letter-spacing: 1px;
    }

    /* ── Messages Area ──────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(79, 195, 247, 0.2);
      border-radius: 10px;
    }

    /* ── Message Row ────────────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .msg-avatar.bot {
      background: linear-gradient(135deg, #1a3a6b, #0d2040);
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .msg-avatar.user {
      background: linear-gradient(135deg, #fc6329, #e84f18);
      box-shadow: 0 0 10px var(--nasa-glow);
    }

    /* ── Bubbles ────────────────────────────────────────────── */
    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
    }

    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .bubble.user {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px var(--nasa-glow);
    }

    /* Markdown rendering inside bubbles */
    .bubble strong { color: var(--accent); font-weight: 600; }
    .bubble em     { color: #a8c4e0; font-style: italic; }
    .bubble code   { font-family: var(--font-mono); font-size: 12px; background: rgba(0,0,0,0.3); padding: 1px 5px; border-radius: 4px; color: var(--nasa-orange); }
    .bubble a      { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); }
    .bubble a:hover{ border-bottom-style: solid; }
    .bubble .sep   { border: none; border-top: 1px solid rgba(79,195,247,0.15); margin: 8px 0; }

    .bubble.user strong { color: #ffe0d0; }
    .bubble.user em     { color: #ffd0b0; }

    .timestamp {
      font-size: 10.5px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }

    .msg-row.bot .timestamp { text-align: left; }

    /* ── Typing Indicator ───────────────────────────────────── */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0);  opacity: 0.4; }
      50%       { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Quick Actions ──────────────────────────────────────── */
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px 0;
      flex-shrink: 0;
    }

    .quick-btn {
      font-family: var(--font-main);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(79, 195, 247, 0.06);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: rgba(79, 195, 247, 0.15);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .quick-btn:active { transform: translateY(0); }

    /* ── Input Area ─────────────────────────────────────────── */
    .input-area {
      padding: 14px 16px 20px;
      background: rgba(13, 21, 38, 0.85);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      font-family: var(--font-main);
      font-size: 14.5px;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(79, 195, 247, 0.2);
      border-radius: 14px;
      padding: 12px 16px;
      resize: none;
      min-height: 46px;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow-y: auto;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    #msg-input:focus {
      border-color: rgba(79, 195, 247, 0.5);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #send-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #fc6329, #e84f18);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px var(--nasa-glow);
    }

    #send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--nasa-glow);
    }

    #send-btn:active { transform: translateY(0); }

    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    #send-btn:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }

    /* ── Welcome message ────────────────────────────────────── */
    .welcome {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-muted);
    }

    .welcome-icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }

    .welcome h2 {
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto;
    }

    /* ── Error toast ────────────────────────────────────────── */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(239, 68, 68, 0.9);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 13px;
      max-width: 320px;
      z-index: 100;
      animation: slide-in 0.3s ease;
      box-shadow: 0 4px 16px rgba(239,68,68,0.3);
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .bubble { max-width: 85%; }
      .nasa-badge { display: none; }
    }
  </style>
</head>
<body>

<!-- Starfield canvas -->
<canvas id="stars-canvas"></canvas>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-avatar">🛸</div>
    <div class="header-info">
      <div class="header-title">NASA Explorer Bot</div>
      <div class="header-subtitle">
        <span class="status-dot"></span>Conectado a las APIs de la NASA
      </div>
    </div>
    <div class="nasa-badge">DEMO_KEY</div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <span class="welcome-icon">🚀</span>
      <h2>NASA Explorer Bot</h2>
      <p>
        Preguntame sobre la <strong>foto del día de la NASA</strong> o los
        <strong>asteroides cercanos a la Tierra</strong> en tiempo real.
      </p>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="quick-actions" id="quick-actions">
    <button class="quick-btn" onclick="sendQuick('foto del día')">📸 Foto del día</button>
    <button class="quick-btn" onclick="sendQuick('asteroides de hoy')">☄️ Asteroides hoy</button>
    <button class="quick-btn" onclick="sendQuick('hola')">👋 Hola</button>
    <button class="quick-btn" onclick="sendQuick('hay algo cerca de la tierra?')">🌍 ¿Hay peligro?</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="msg-input"
        placeholder="Escribí tu mensaje..."
        rows="1"
        autofocus
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
  /* ──────────────────────────────────────────────────────────
     Config
  ────────────────────────────────────────────────────────── */
  const RASA_URL  = "http://localhost:5005/webhooks/rest/webhook";
  const SENDER_ID = "user_" + Math.random().toString(36).slice(2, 8);

  /* ──────────────────────────────────────────────────────────
     Starfield
  ────────────────────────────────────────────────────────── */
  const canvas  = document.getElementById("stars-canvas");
  const ctx     = canvas.getContext("2d");
  let stars     = [];

  function initStars() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 180 }, () => ({
      x:    Math.random() * canvas.width,
      y:    Math.random() * canvas.height,
      r:    Math.random() * 1.4 + 0.2,
      o:    Math.random(),
      do:   (Math.random() * 0.006 + 0.002) * (Math.random() > 0.5 ? 1 : -1),
    }));
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.o += s.do;
      if (s.o > 1 || s.o < 0.1) s.do *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 225, 255, ${s.o})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener("resize", initStars);
  initStars();
  drawStars();

  /* ──────────────────────────────────────────────────────────
     Markdown renderer (simple)
  ────────────────────────────────────────────────────────── */
  function renderMarkdown(text) {
    return text
      .replace(/&/g,  "&amp;")
      .replace(/</g,  "&lt;")
      .replace(/>/g,  "&gt;")
      // Links: [text](url) or bare URL
      .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/(https?:\/\/[^\s<>\)]+)/g,             '<a href="$1" target="_blank" rel="noopener">$1</a>')
      // Bold **text**
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      // Italic *text*
      .replace(/\*([^*\n]+)\*/g,   "<em>$1</em>")
      // Inline code
      .replace(/`([^`]+)`/g,       "<code>$1</code>")
      // Horizontal rule ---
      .replace(/^---$/gm,          "<hr class='sep'>")
      // Line breaks
      .replace(/\n/g,              "<br>");
  }

  /* ──────────────────────────────────────────────────────────
     Time helper
  ────────────────────────────────────────────────────────── */
  function now() {
    return new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
  }

  /* ──────────────────────────────────────────────────────────
     Append message
  ────────────────────────────────────────────────────────── */
  function appendMessage(text, role) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const msgs = document.getElementById("messages");
    const row  = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `msg-avatar ${role}`;
    avatar.textContent = role === "user" ? "👤" : "🛸";

    const wrap  = document.createElement("div");

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = renderMarkdown(text);

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(ts);

    row.appendChild(avatar);
    row.appendChild(wrap);

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  /* ──────────────────────────────────────────────────────────
     Typing indicator
  ────────────────────────────────────────────────────────── */
  let typingEl = null;

  function showTyping() {
    if (typingEl) return;
    const msgs = document.getElementById("messages");
    typingEl   = document.createElement("div");
    typingEl.className = "typing-row";
    typingEl.innerHTML = `
      <div class="msg-avatar bot">🛸</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    msgs.appendChild(typingEl);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  /* ──────────────────────────────────────────────────────────
     Toast error
  ────────────────────────────────────────────────────────── */
  function showToast(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  /* ──────────────────────────────────────────────────────────
     Send to Rasa
  ────────────────────────────────────────────────────────── */
  async function sendToRasa(text) {
    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    showTyping();

    try {
      const res = await fetch(RASA_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ sender: SENDER_ID, message: text }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const messages = await res.json();
      hideTyping();

      if (!messages || messages.length === 0) {
        appendMessage("📡 El servidor no devolvió respuesta. Intentá de nuevo.", "bot");
      } else {
        messages.forEach(m => {
          if (m.text) appendMessage(m.text, "bot");
        });
      }

    } catch (err) {
      hideTyping();
      if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
        showToast("❌ No se pudo conectar con Rasa. ¿Está corriendo en localhost:5005 con --cors?");
        appendMessage(
          "⚠️ **Sin conexión con el servidor.**\n\n" +
          "Asegurate de que Rasa esté corriendo con:\n" +
          "`python -m rasa run --cors \"*\" --enable-api`",
          "bot"
        );
      } else {
        showToast(`❌ Error: ${err.message}`);
      }
    } finally {
      btn.disabled = false;
    }
  }

  /* ──────────────────────────────────────────────────────────
     Send functions
  ────────────────────────────────────────────────────────── */
  async function sendMessage() {
    const input = document.getElementById("msg-input");
    const text  = input.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    input.value = "";
    input.style.height = "auto";

    await sendToRasa(text);
  }

  async function sendQuick(text) {
    appendMessage(text, "user");
    await sendToRasa(text);
  }

  /* ──────────────────────────────────────────────────────────
     Input auto-resize & Enter to send
  ────────────────────────────────────────────────────────── */
  const input = document.getElementById("msg-input");

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
