version: "3.1"

intents:
  - ask_api_data
  - ask_future_weather
  - chitchat
  - exit_conversation

entities:
  - location

actions:
  - action_call_api
  - action_future_weather
  - action_session_start

responses:
  utter_chitchat:
  - text: "Soy un asistente experto y mi propósito es responder de forma directa."
  
  utter_redirect_to_api:
  - text: "Por favor, volvamos al tema central. ¿Qué información te gustaría consultar? (ej. clima o precios)"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
