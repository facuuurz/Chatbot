version: "3.1"

intents:
  - ask_api_data
  - ask_future_weather
  - chitchat
  - greet
  - goodbye
  - thanks

entities:
  - location

actions:
  - action_call_api
  - action_future_weather
  - action_session_start

responses:
  utter_greet:
  - text: "¡Hola! Soy tu asistente meteorológico. ¿En qué te puedo ayudar hoy?"
    buttons:
      - title: "Ver Clima Actual"
        payload: "/ask_api_data"
      - title: "Consultar Pronóstico"
        payload: "/ask_future_weather"

  utter_goodbye:
  - text: "¡Hasta luego! Que tengas un excelente día."

  utter_welcome:
  - text: "¡De nada! Estoy aquí para ayudarte."

  utter_chitchat:
  - text: "Soy un asistente experto y mi propósito es darte información del clima."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
